<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Hello world</title>
</head>
<body>
	Ahoj, dnes je {{ date }}.
	<hr>
	{% if name %}
		<strong>{{ name }} {{ surname }}, rád tě vidím!</strong><hr>
	{% endif %}
	
	{% if message %}
	<strong>{{ message }}</strong><hr>
	{% endif %}
	
	{% if message_name1 %}
	<strong>{{ message_name1 }}</strong><hr>
	{% endif %}
	{% if message_name2 %}
	<strong>{{ message_name2 }}</strong><hr>
	{% endif %}
	Řekni mi své jméno a já tě pozdravím!
	<form method="POST">
		<input type="text" name="name" placeholder="Zadej své jméno">
		<input type="text" name="surname" placeholder="Zadej své příjmení">
		<input type="password" name="password" placeholder="Zadej své heslo">
		<button type="submit">Pozdrav mě!</button>
	</form>

</body>
</html>
